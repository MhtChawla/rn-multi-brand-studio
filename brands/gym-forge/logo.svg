<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded square background in near-black (onPrimary = background for dark scheme) -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="#0A0A0F"/>

  <!-- Bold "F" letterform in electric cyan, with a lightning-bolt slash replacing the crossbar -->
  <!-- Vertical stem -->
  <rect x="148" y="112" width="72" height="288" rx="10" ry="10" fill="#00E5FF"/>

  <!-- Top horizontal bar -->
  <rect x="148" y="112" width="224" height="68" rx="10" ry="10" fill="#00E5FF"/>

  <!-- Lightning bolt replacing the mid crossbar:
       drops diagonally from mid-right to mid-left, creating a "struck" crossbar feel -->
  <polygon
    points="372,232  280,232  240,300  308,300  250,400  368,270  296,270  344,232"
    fill="#00E5FF"
  />
</svg>
